name: 7ice-platform

services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    command: start
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - backend

  keycloak-init:
    image: quay.io/keycloak/keycloak:26.2
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./docker/keycloak/init-prod.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      CLIENT_SECRET: ${AUTH_OIDC_CLIENT_SECRET}
      REDIRECT_URIS: ${APP_URL}/*
      WEB_ORIGINS: ${APP_URL}
    networks:
      - backend

  application:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - uploads-data:/app/uploads
    networks:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads-data:/uploads:ro
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - backend

  migrate:
    build:
      context: .
      target: builder
    env_file:
      - .env
    command: ["sh", "-c", "npx prisma migrate deploy && echo 'Migrations applied'"]
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - setup

volumes:
  postgres-data:
  uploads-data:

networks:
  backend:
